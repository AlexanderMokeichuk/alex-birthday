<!DOCTYPE html>
<html><head><meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body{margin:0;display:flex;align-items:center;justify-content:center;background:#222;}
        .og{width:1200px;height:630px;background:radial-gradient(ellipse at 50% 40%,rgba(60,20,30,.5),#0b0a0f 70%);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            font-family:'Space Mono',monospace;position:relative;overflow:hidden;}
        .kick{font-size:18px;letter-spacing:.35em;color:#e23744;border:1px solid rgba(226,55,68,.4);
            padding:8px 20px;border-radius:3px;background:rgba(226,55,68,.06);margin-bottom:30px;}
        .h{font-family:'Bebas Neue',sans-serif;font-size:150px;line-height:.82;color:#f5f0e6;}
        .h2{font-family:'Bebas Neue',sans-serif;font-size:150px;line-height:.82;
            background:linear-gradient(120deg,#ffb02e,#e23744);-webkit-background-clip:text;
            -webkit-text-fill-color:transparent;}
        .nm{display:flex;align-items:center;gap:24px;margin-top:18px;}
        .nm-s{font-family:'Caveat',cursive;font-size:90px;color:#f5f0e6;transform:rotate(-4deg);}
        .stamp{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.1em;color:#e23744;
            border:3px solid #e23744;border-radius:8px;padding:4px 14px;transform:rotate(8deg);}
        .tag{font-size:22px;color:rgba(245,240,230,.55);margin-top:34px;}
        .tag em{color:#f5f0e6;}.tag span{color:#e23744;}
    </style></head>
<body>
<div class="og">
    <div class="kick">CASE FILE №047 — СОВЕРШЕННО СЕКРЕТНО</div>
    <div class="h">HAPPY</div>
    <div class="h2">BIRTHDAY</div>
    <div class="nm"><span class="nm-s">Alex</span><span class="stamp">25+</span></div>
    <div class="tag">Оставь поздравление. <em>Анонимно.</em> <span>наверное 🕵️</span></div>
</div>
</body></html>
